# Summary
summary: |
  Built the fw CLI wrapper (bin/fw) as the single entry point for all framework
  operations. fw resolves PROJECT_ROOT and FRAMEWORK_ROOT via a 3-tier strategy
  (relative to bin/, .framework.yaml config, or actionable error), then routes
  commands to agent scripts via exec. This enables the shared tooling model where
  the framework lives centrally and projects reference it via .framework.yaml.
  Includes embedded doctor command for health checking.

