  - "fw help shows all commands with examples"
  - "fw version shows version + paths + version pin check"
  - "fw doctor validates framework health (7 checks)"
  - "fw <agent> routes to correct agent script via exec"
  - "Works from inside framework repo (self-referential mode)"
  - "Works from external project via .framework.yaml"
  - "Actionable error when framework not found (D2/D3)"

# What worked well
successes:
  - description: "3-tier path resolution (relative, config, error)"
    why: "Covers all use cases: framework-internal, shared tooling, and misconfigured"
  - description: "exec for command routing"
