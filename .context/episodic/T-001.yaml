# Summary
summary: |
  Bootstrapped the framework's measurement system through experiential learning
  rather than upfront design. After theoretical metrics failed, pivoted to
  experimentation — created the task structure, used it for real work, then
  defined 6 measurable metrics from observed data (git traceability, task
  completion, description quality, AC completion, context captured, audit pass
  rate). Identified 4 metrics that cannot be measured (outcomes, time saved,
  bugs prevented, agent discipline), leading to the insight: measure structural
  metrics over behavioral ones. This became practice P-002.

