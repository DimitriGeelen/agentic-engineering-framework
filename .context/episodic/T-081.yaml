# What worked well
successes:
  - description: "Python inline script for Decision section updates"
    why: "Avoided file parsing complexity by using Python's string manipulation within bash heredoc. Clean separation of concerns: bash for routing, Python for structured editing."
  - description: "Automatic task completion on go/no-go decision"
    why: "Encodes the workflow rule that inception tasks end at the decision gate, preventing forgotten task cleanup. Only defer keeps task active for continued exploration."
  - description: "Contextual next-step guidance"
    why: "Each subcommand prints relevant next actions (e.g., after 'start': register assumptions; after 'decide go': create build tasks). Lowers cognitive load for users."

