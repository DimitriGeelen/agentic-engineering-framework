decisions:
  - decision: "Use Python inline script for Decision section updates instead of sed"
    rationale: "Decision section has multi-line structure (Decision, Rationale, Date). Sed would require complex line counting and state machine. Python provides cleaner string manipulation and YAML-safe formatting."
    alternatives_rejected: ["sed multi-line replacement", "awk script", "dedicated editing agent"]
