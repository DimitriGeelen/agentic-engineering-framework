# Summary
summary: |
  Built lib/init.sh to enable `fw init` project bootstrapping, which scaffolds the full framework
  directory structure (.tasks, .context, provider config, git hooks, .framework.yaml) into any target
  project directory. This is a key enabler for the shared-tooling model — projects adopt the framework
  with a single command rather than manual setup, and `fw doctor` passes immediately on an initialized project.

# Key outcomes (from acceptance criteria)
outcomes:
- "`fw init` scaffolds full directory structure"
- "`fw init --provider claude` generates CLAUDE.md"
- "`fw init --provider cursor` generates .cursorrules"
- "`.framework.yaml` points to correct framework path"
- "Git hooks installed when .git exists"
- "Idempotent — refuses reinit without --force"
- "Task template copied from framework"

# What worked well
successes:
- description: "Embedding init as lib/init.sh sourced by fw rather than a separate agent"
  why: "Init is a one-time setup operation, not a recurring workflow. Keeping it as a library function avoids agent overhead
    while still being accessible via the fw CLI."
- description: "Idempotent design with --force flag for re-initialization"
  why: "Prevents accidental overwrites of project-specific customizations while still allowing intentional resets."

