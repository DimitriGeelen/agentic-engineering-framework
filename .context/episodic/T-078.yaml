challenges:
  - description: "Session f4480b79 hit 177K tokens (88% of limit) with ZERO warnings, then compacted"
    resolution: "Root cause was stale transcript cache in find_transcript() — cached path across sessions so check always read old data. Removed cache, now always finds most-recent transcript."
  - description: "Context compaction made working memory unreadable, but task was partially complete"
    resolution: "Recovered 9 enriched episodic files (T-073 work) from disk—compaction only destroyed working context, not persisted artifacts. Session resumed from disk state."
  - description: "Synthetic model entries in transcript appeared to have 0 tokens, hiding compaction"
    resolution: "Claude Code writes <synthetic> entries after compaction with 0 token usage. Now filtered out so last real entry determines actual context size."

# Decisions made during this task
# [TODO] Extract decisions from Design Record. Include rationale and alternatives rejected.
# Format: - decision: "What was decided" / rationale: "Why" / alternatives_rejected: ["Option B"]
decisions:
  - decision: "Always find most-recent transcript instead of caching path"
    rationale: "Caching path optimization broke session isolation—old file stayed cached across new sessions. Cost of finding file is acceptable (~33ms) compared to silent failure cost."
    alternatives_rejected: ["Session-aware cache key", "Cached with file-mtime check"]
  - decision: "Increase tail -c window from 500KB to 2MB"
    rationale: "Sub-agent result ingestion bloated transcript by 528KB, pushing real entries outside read window. 2MB window is still fast (~44ms) and handles all known payload sizes."
    alternatives_rejected: ["Read entire transcript (too slow)", "Increase by smaller amount (500KB->1MB)"]
  - decision: "Filter <synthetic> model entries in token counting"
    rationale: "Claude Code writes synthetic entries (0 tokens) after compaction. Taking last entry would report 0, hiding context destruction. Filter ensures we see real usage only."
    alternatives_rejected: ["Detect synthetic by timestamp", "Detect by looking at surrounding entries"]
  - decision: "Add previous-token comparison for compaction detection"
    rationale: "Compaction is a critical event (destroys working memory) and needs immediate alerting. Comparing prev vs current can detect sudden drops when last entry is 0 tokens."
    alternatives_rejected: ["Check for 0 tokens alone", "Wait for next token reading after compaction"]

