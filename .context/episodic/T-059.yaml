    alternatives_rejected: ["Block at critical threshold"]
  - decision: "Post-commit resets counter, not handover"
    rationale: "Commits are the real safety checkpoints; rewards commit-often behavior"
    alternatives_rejected: ["Reset only on handover generation"]
  - decision: "Emergency handover has zero [TODO] sections"
