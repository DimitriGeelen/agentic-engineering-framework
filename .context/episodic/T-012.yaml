# Summary
summary: |
  Built the handover agent to enable seamless context transfer between sessions.
  Key insight from deep reflection: handover is FORWARD-looking ("what does next
  session need?") while session-capture is BACKWARD-looking ("what happened?").
  The state vs. understanding distinction is critical - state can be reconstructed
  from artifacts, but understanding is lost forever if not captured.

