- "Detects new patterns, learnings, decisions"
- "Correctly identifies duplicates via string matching"
- "Refuses to harvest from framework itself"
- "Appends with provenance (harvested_from, harvest_date) when not dry-run"
- "`--verbose` shows duplicates explicitly"
- "Harvest log maintained at .context/harvest.log"

# What worked well
successes:
