# Summary
summary: |
  Built lib/harvest.sh for the `fw harvest` command, which pulls learnings, patterns, and decisions
  from a project's .context/ back to the framework with provenance tracking. This closes the
  cross-project learning loop — projects generate knowledge through work, and harvest promotes
  reusable insights back to the framework for all future projects to benefit from. The graduation
  pipeline concept (local -> candidate -> practice) was designed but not yet enforced.

