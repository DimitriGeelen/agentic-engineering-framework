# Summary
summary: |
  Created fw assumption CLI commands to manage project assumptions across their lifecycle. Implemented four subcommands: add generates A-XXX IDs and stores assumptions in .context/project/assumptions.yaml linked to inception tasks, validate/invalidate record evidence and update status with timestamps, and list shows color-coded assumptions (green=validated, red=invalidated, yellow=untested) with optional status filtering. Discovered and fixed a critical bug during testing where sys.argv[1:5] extracted only 4 arguments instead of 5, causing Python script failures. This provides the assumptions register identified as necessary in T-079 design.

# Key outcomes (from acceptance criteria)
outcomes:
  - "fw assumption add generates A-XXX IDs and stores in assumptions.yaml"
  - "fw assumption validate/invalidate records evidence and dates"
  - "fw assumption list shows color-coded by status with filtering"
  - "Bug found and fixed: sys.argv slice error (1:5 should be 1:6 for 5 args)"
  - "Full lifecycle tested successfully"
  - "Integration with bin/fw routing completed"

# What worked well
successes:
  - description: "YAML-based assumptions register in .context/project/"
    why: "Assumptions outlive individual inception tasks and need to be queryable across the project lifecycle. Storing in project memory (not task-specific) enables cross-inception pattern recognition."
  - description: "Auto-incrementing A-XXX ID generation"
    why: "Pythonic max(existing_ids) + 1 approach is simple and collision-free. Three-digit zero-padding (A-001) maintains visual consistency with task IDs."
  - description: "Color-coded status in list output"
    why: "Validated (green), invalidated (red), untested (yellow) provides instant visual feedback on assumption health. Critical for inception go/no-go decisions."

# Challenges encountered
challenges:
  - issue: "sys.argv[1:5] only extracted 4 arguments instead of 5"
    root_cause: "Python slice [1:5] means indices 1,2,3,4 (4 elements). For 5 args after script name, needed [1:6]."
    resolution: "Changed to sys.argv[1:6] in assumption.sh line 195 (do_assumption_update function)"
    learning: "Python slice end index is exclusive. Common off-by-one error when converting 'I need N args' to slice notation."

# Decisions made during this task
decisions:
  - decision: "Store assumptions in .context/project/assumptions.yaml (not task files)"
    rationale: "Assumptions are project-level knowledge, not task-specific. Multiple inception tasks may reference the same assumption. Centralized register enables assumption reuse and lifecycle tracking beyond individual tasks."
    alternatives_rejected: ["Store in task frontmatter", "Create .tasks/assumptions/ directory", "Store in episodic memory"]
  - decision: "Evidence stored as array with date timestamps"
    rationale: "An assumption might be partially validated by multiple experiments. Array structure allows cumulative evidence gathering. Timestamps enable understanding of when validation occurred."
    alternatives_rejected: ["Single evidence string", "Separate evidence.yaml file"]
  - decision: "Require --evidence flag for validate/invalidate"
    rationale: "Antifragility principle: we learn from why assumptions fail or succeed. Evidence is the learning artifact. Making it required prevents lazy status updates without documentation."
    alternatives_rejected: ["Optional evidence", "Auto-generated evidence from git log"]
  - decision: "validation_method field defaults to 'TBD'"
    rationale: "Forces explicit thinking about how to test each assumption. TBD acts as a reminder to plan validation before executing."
    alternatives_rejected: ["Omit validation_method field", "Auto-infer from assumption text"]

