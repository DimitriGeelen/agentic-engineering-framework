# Summary
summary: |
  Added two lightweight features to the task system based on a structured evaluation
  of four proposed process improvements (backlog, hierarchy, sprints, estimation).
  The evaluation rejected heavyweight approaches in favor of tags+related_tasks for
  grouping (instead of epics/hierarchy) and passive metrics derived from git/timestamps
  (instead of manual story-point estimation). Tags are optional frontmatter fields
  that enable task grouping without structural hierarchy. Passive metrics are computed
  automatically in episodic generation from git commit data and timestamps.

