# Decisions made during this task
decisions:
  - decision: "Tags as flat array rather than structured categories"
    rationale: "Flat tags are simpler, more flexible, and avoid the taxonomy design problem. Users can impose structure through naming conventions (e.g. 'phase-2', 'watchtower-ui')."
    alternatives_rejected: ["Structured categories (domain/component/phase)", "Separate tag taxonomy file"]
  - decision: "Derive metrics passively from git rather than manual estimation"
    rationale: "Manual story points are meaningless for AI agents. Git data (commits, lines, files) is objective and already available. The learning loop comes from comparing similar tasks."
    alternatives_rejected: ["Manual story points", "Token-based estimation", "Time-based estimation"]
  - decision: "Rejected backlog, hierarchy, and sprints proposals"
    rationale: "status:captured already serves as backlog. Hierarchy adds brittle coupling for single-agent work. Sessions already ARE sprints. Adding ceremony without proven pain violates antifragility directive."
    alternatives_rejected: ["Formal backlog register", "Epic/feature/task hierarchy", "Sprint planning framework"]

