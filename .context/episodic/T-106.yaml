# Decisions made during this task
decisions:
  - decision: "Use HTTP Basic Auth with username:access_token"
    rationale: "OneDev v13.1.5 does not support Bearer tokens; Basic Auth is only mechanism"
    alternatives_rejected: ["Bearer tokens", "SSH keys"]
  - decision: "Credential store for token management"
    rationale: "Avoids embedding tokens in git config; credential store is OS-native on Linux/Mac/Windows"
    alternatives_rejected: ["Plain git config", "Environment variables"]
  - decision: "PATH symlink vs. clone in known location"
    rationale: "Recommended clone to controlled location; symlink to bin/fw is cleaner than PATH modification"
    alternatives_rejected: ["Export PATH directly"]

