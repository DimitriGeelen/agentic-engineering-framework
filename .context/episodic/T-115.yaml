summary: |
  Fixed a bug where `fw context add-pattern` silently dropped entries when appending
  to non-empty sections in patterns.yaml. The awk script used `prev ~ section` to detect
  section boundaries, but prev held the last data line, never the section header. The
  command printed "Pattern added" regardless, masking the data loss. Found during T-112
  investigation when FP-006 was "added" but missing from the file.

