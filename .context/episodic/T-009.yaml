# Summary
summary: |
  Defined what would prove the framework approach wrong. For each of the 4
  directives (Antifragility, Reliability, Usability, Portability) and 3 core
  mechanisms (Task System, Context Fabric, Learning Loop), documented claims,
  failure indicators, and observable signals. Established pivot threshold:
  abandon/redesign when 3+ directives fail OR 2+ mechanisms fail. Critical for
  D1 — we need to know when to pivot rather than persist with a failing approach.

