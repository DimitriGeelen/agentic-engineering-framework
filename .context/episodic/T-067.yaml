# Summary
summary: |
  Built a plugin task-awareness audit tool that scans all enabled Claude Code plugins
  and classifies their skills/agents/commands as TASK-AWARE, TASK-SILENT, or TASK-BYPASSING.
  This closes the remediation loop from T-061 (task-first bypass investigation) by providing
  a repeatable way to detect plugins that may override the framework's core governance principle.
  Integrated into both `fw plugin-audit` (detailed report) and `fw doctor` Check 7 (routine health check).

