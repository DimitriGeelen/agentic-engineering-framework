# Episodic Memory Template
# Generated automatically when a task moves to work-completed.
# Provides condensed history for future reference.

# Task identification
task_id: T-XXX
task_name: "Task name"
workflow_type: build

# Timeline
created: 2026-01-01T00:00:00Z
completed: 2026-01-02T00:00:00Z
duration_days: 1

# Summary
summary: |
  Brief description of what was accomplished.
  Focus on outcomes, not process.

# Key outcomes
outcomes:
  - "Outcome 1"
  - "Outcome 2"

# What worked well
successes:
  - description: "What worked"
    why: "Why it worked"

# What didn't work (initially)
challenges:
  - description: "What didn't work"
    resolution: "How it was resolved"
    learning: "What we learned"

# Decisions made during this task
decisions: []
  # - decision: "Decision text"
  #   rationale: "Why"
  #   alternatives_rejected: ["alt1", "alt2"]

# Files created or significantly modified
artifacts:
  created: []
  modified: []

# Related tasks
related_tasks:
  blocked: []  # Tasks this unblocked
  absorbed: []  # Tasks merged into this one
  spawned: []  # Tasks created from this one

# Tags for retrieval
tags: []
