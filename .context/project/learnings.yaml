learnings:
  - id: L-001
    learning: "Measure what exists, not what should exist"
    source: P-001
    task: T-014
    date: 2026-02-13
    context: "Audit was checking for existence of files, not quality of content"
    application: "Always add quality heuristics alongside existence checks"

  - id: L-002
    learning: "Structural enforcement over agent discipline"
    source: P-002
    task: T-013
    date: 2026-02-13
    context: "Git hooks enforce task refs, not agent willpower"
    application: "When you need something to always happen, use a hook/gate"

  - id: L-003
    learning: "Healthy dysfunction indicates framework value"
    source: T-014
    task: T-014
    date: 2026-02-13
    context: "Audit found issues with itself, proving it works"
    application: "Self-critique capability is a feature, not a bug"

  - id: L-004
    learning: "Only update active tasks to avoid timestamp loops"
    source: T-013
    task: T-013
    date: 2026-02-13
    context: "Git agent updated completed tasks causing endless uncommitted changes"
    application: "Check task status before updating metadata"

  - id: L-005
    learning: "Automation that produces sub-human-quality output must fail visibly, not succeed quietly"
    source: Multi-agent review
    task: T-015
    date: 2026-02-13
    context: "Added via context agent"
    application: "Quality gates should reject, not accept-and-warn"

  - id: L-006
    learning: "Classifier keyword ordering determines accuracy — check specific types before generic"
    source: healing-loop
    task: T-028
    date: 2026-02-13
    context: "E-005 found classifier checked 'code' before 'dependency', causing misclassification"
    application: "When building keyword classifiers, order from most-specific to least-specific"

  - id: L-007
    learning: "grep -c || echo 0 produces multi-line output — use ) || var=0 instead"
    source: T-041
    task: T-041
    date: 2026-02-14
    context: "grep -c returns 0 with exit code 1 when no matches; || echo 0 appends a second '0', making the variable '0\\n0' which breaks integer comparisons"
    application: "Use var=$(grep -c ... 2>/dev/null) || var=0 — the fallback assignment only runs on failure, doesn't contaminate stdout"

  - id: L-008
    learning: "((x++)) crashes under set -e when x=0 — use x=$((x + 1))"
    source: T-033
    task: T-033
    date: 2026-02-14
    context: "((0++)) evaluates to 0 (falsy), returning exit code 1 which triggers set -e"
    application: "Never use ((var++)) in set -e scripts — use var=$((var + 1)) which always returns 0"

  - id: L-009
    learning: "Claude Code JSONL transcript contains per-message token usage at message.usage"
    source: T-059
    task: T-059
    date: 2026-02-14
    context: "Transcript at ~/.claude/projects/*/UUID.jsonl has input_tokens, cache_read_input_tokens, cache_creation_input_tokens in every assistant message. Effective context = sum of all three."
    application: "Use tail -c 500000 + python3 JSON parse to read context size in O(1) time regardless of transcript size"

  - id: L-010
    learning: "Claude Code compaction occurs at ~155-165K tokens — context is summarized, not preserved"
    source: T-059
    task: T-059
    date: 2026-02-14
    context: "Analyzed 4103 API calls across sessions. Peak context before compaction consistently 155K-165K. Post-compaction drops to ~40-50K (summary). Work context is lost."
    application: "Set warning thresholds well below 155K (100K/130K/150K) to give time to commit and handover"

  - id: L-011
    learning: "Token reading from JSONL lags ~1 API call behind actual usage"
    source: T-059
    task: T-059
    date: 2026-02-14
    context: "The usage data records what the PREVIOUS call consumed. By the time the hook reads it, current call has already added more. Observed lag ~10-30K tokens."
    application: "Never set thresholds close to the compaction limit — maintain at least 30K buffer"

  - id: L-012
    learning: "grep for 'input_tokens' in JSONL matches command text, not just usage data"
    source: T-059
    task: T-059
    date: 2026-02-14
    context: "Commands that reference input_tokens (like analyzing token usage) get recorded in JSONL tool_use entries. grep can't distinguish usage data from command text."
    application: "Use proper JSON parsing (python3) to extract message.usage, not grep patterns"


  - id: L-013
