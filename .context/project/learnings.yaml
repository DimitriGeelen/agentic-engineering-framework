- id: L-007
  learning: grep -c || echo 0 produces multi-line output — use ) || var=0 instead
  source: T-041
  task: T-041
  date: 2026-02-14
  context: grep -c returns 0 with exit code 1 when no matches; || echo 0 appends a second '0', making the variable '0\n0'
    which breaks integer comparisons
  application: Use var=$(grep -c ... 2>/dev/null) || var=0 — the fallback assignment only runs on failure, doesn't contaminate
    stdout
- id: L-008
  learning: ((x++)) crashes under set -e when x=0 — use x=$((x + 1))
  source: T-033
  task: T-033
  date: 2026-02-14
  context: ((0++)) evaluates to 0 (falsy), returning exit code 1 which triggers set -e
  application: Never use ((var++)) in set -e scripts — use var=$((var + 1)) which always returns 0
- id: L-009
  learning: Claude Code JSONL transcript contains per-message token usage at message.usage
  source: T-059
  task: T-059
  date: 2026-02-14
  context: Transcript at ~/.claude/projects/*/UUID.jsonl has input_tokens, cache_read_input_tokens, cache_creation_input_tokens
    in every assistant message. Effective context = sum of all three.
  application: Use tail -c 2000000 + python3 JSON parse to read context size in O(1) time regardless of transcript size (500K
    was too small when sub-agent results bloat transcript end)
- id: L-010
  learning: Claude Code compaction occurs at ~155-165K tokens — context is summarized, not preserved
  source: T-059
  task: T-059
  date: 2026-02-14
  context: Analyzed 4103 API calls across sessions. Peak context before compaction consistently 155K-165K. Post-compaction
    drops to ~40-50K (summary). Work context is lost.
  application: Set warning thresholds well below 155K (100K/130K/150K) to give time to commit and handover
- id: L-011
  learning: Token reading from JSONL lags ~1 API call behind actual usage
  source: T-059
  task: T-059
  date: 2026-02-14
  context: The usage data records what the PREVIOUS call consumed. By the time the hook reads it, current call has already
    added more. Observed lag ~10-30K tokens.
  application: Never set thresholds close to the compaction limit — maintain at least 30K buffer
- id: L-012
  learning: grep for 'input_tokens' in JSONL matches command text, not just usage data
  source: T-059
  task: T-059
  date: 2026-02-14
  context: Commands that reference input_tokens (like analyzing token usage) get recorded in JSONL tool_use entries. grep
    can't distinguish usage data from command text.
  application: Use proper JSON parsing (python3) to extract message.usage, not grep patterns
- id: L-013
  learning: 'Plugins that claim absolute authority (using-superpowers: ''YOU DO NOT HAVE A CHOICE'') will override framework
    rules written in CLAUDE.md when they conflict. Structural enforcement (P-002) must be actual code gates, not markdown
    instructions. Gap G-001 decision trigger has fired.'
  source: P-002
  task: T-061
  date: 2026-02-15
  context: Added via context agent
  application: Built PreToolUse hook (T-063) to structurally block Write/Edit without active task. Added instruction precedence
    to CLAUDE.md (T-062). Created /start-work skill (T-065).
- id: L-014
  learning: Caching optimizations that don't validate session identity are dangerous — stale cache causes safety systems to
    read wrong data
  source: T-078
  task: T-078
  date: 2026-02-16
  context: checkpoint.sh cached transcript path across sessions. It validated file existence but not recency, causing it to
    read an old session's token count while the current session hit 177K tokens with zero warnings.
  application: Removed transcript cache entirely. Always find most-recent file (~33ms, acceptable). Safety systems must never
    cache identity-dependent state across session boundaries.
- id: L-015
  learning: Context recovery after compaction takes ~16 seconds using resume agent + handover — but LATEST.md must be committed
    immediately or it will be stale with TODO placeholders
  source: E-003
  task: T-022
  date: 2026-02-13
  context: Experiment simulated compaction by pretending to start fresh. Resume agent showed focus task, status, and uncommitted
    changes. Handover 'Where We Are' section provided full session state.
  application: Always commit handover immediately after generation. Resume agent warns when LATEST.md contains TODO placeholders.
- id: L-016
  learning: Enforcement gates are load-bearing, not theater — removing the git commit-msg hook caused traceability to drop
    from 97% to 88% in just 5 commits
  source: E-004
  task: T-024
  date: 2026-02-13
  context: Experiment E-004 disabled git hook, made 5 commits without task refs, measured degradation. Audit detected both
    the missing hook AND the traceability drop.
  application: Never remove enforcement gates without evidence they are redundant. Preventive (hooks) and detective (audit)
    controls serve different roles — both are needed.
- id: L-017
  learning: Healing loop classifier is keyword-order-dependent — check specific types before generic
  source: E-005
  task: T-025
  date: 2026-02-13
  context: Two tasks with similar dependency failures tested the loop. Classifier checked 'code' before 'dependency', causing
    misclassification. Pattern matching lacks relevance filtering.
  application: When building keyword classifiers, order from most-specific to least-specific. Add type-based filtering to
    pattern matching.
- id: L-018
  learning: Evidence-driven lifecycle decisions are obvious and debate-free — 50 tasks of data made removing 'refined' and
    'blocked' statuses a no-brainer
  source: T-051
  task: T-051
  date: 2026-02-14
  context: Both 'refined' and 'blocked' had exactly 0 uses across 50 tasks. 'Issues' covered all blocking scenarios. Data
    eliminated speculation entirely.
  application: Defer lifecycle and process decisions until sufficient usage data exists. Let the evidence decide.
- id: L-019
  learning: Splitting a monolithic file into blueprints/modules eliminates concurrent-modification risk when multiple agents
    work simultaneously
  source: T-054
  task: T-054
  date: 2026-02-14
  context: web/app.py was 700 lines and had been modified by 4 agents simultaneously. Splitting into 4 blueprints meant each
    agent could work on an independent file.
  application: When a file exceeds ~500 lines or is modified by multiple agents, split by domain.
- id: L-020
  learning: Making compliance easier than non-compliance is the most effective enforcement strategy — fw work-on reduced 3
    manual steps to 1
  source: T-064
  task: T-064
  date: 2026-02-15
  context: T-061 identified compliance friction as a key bypass vector. The 3-step manual process was more work than just
    skipping. fw work-on collapses this to one command.
  application: When enforcement is being bypassed due to friction, reduce the compliant path to fewer steps than the non-compliant
    path.
