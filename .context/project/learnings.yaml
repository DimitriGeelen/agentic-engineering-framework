  - id: L-032
    learning: "When a session does both implementation (T-108 fixes) AND research/exploration (T-109 inception), context burns fast. The research agents alone consumed ~100K tokens of sub-agent budget. Split sessions: one for building, one for thinking. Or do research early while context is fresh."
