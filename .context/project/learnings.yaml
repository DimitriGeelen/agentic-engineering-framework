  - id: L-033
    learning: "Check context budget BEFORE proposing next work, not after. At 60%+ context, the only responsible options are: capture learnings, commit, handover. Proposing to start a spike and then discovering there's no room wastes the user's decision energy and erodes trust in agent judgment. Rule: check checkpoint.sh status before offering next-step options."
    source: P-009
    task: T-108
    date: 2026-02-17
    context: "Added via context agent"
    application: "TBD"

  - id: L-034
    learning: "Task completion status (work-completed) is a flag, not a gate. T-108 was marked complete at 11:22 but 6 commits followed over 173 minutes including substantive framework changes, 2 new task spawns, and a bug fix. The episodic snapshot froze at closure time (claims 2 commits/69min, reality 6 commits/173min). Root cause: no acceptance criteria validation before closure, no warning when committing against closed task IDs. Critical for autonomous mode where no human catches the pattern."
