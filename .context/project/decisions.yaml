# Project Memory - Decisions
# Key decisions made during the project with rationale.
# Referenced when similar decisions come up.

decisions:
  - id: D-001
    decision: "Use commit-msg hook (not pre-commit)"
    date: 2026-02-13
    task: T-013
    rationale: "Validates message format, not file content; more appropriate for task ref check"
    directives_served: [D2]
    alternatives_rejected:
      - "pre-commit (runs before message exists)"

  - id: D-002
    decision: "Audit saves history to YAML files"
    date: 2026-02-13
    task: T-014
    rationale: "Enables trend detection without database, human-readable"
    directives_served: [D1, D2]
    alternatives_rejected:
      - "SQLite (overkill for this use case)"
      - "JSON (less readable than YAML)"

  - id: D-003
    decision: "3+ occurrences triggers practice candidate"
    date: 2026-02-13
    task: T-014
    rationale: "Balance between noise (too few) and missing patterns (too many)"
    directives_served: [D1]
    alternatives_rejected:
      - "2 (too noisy)"
      - "5 (too slow to detect patterns)"

  - id: D-004
    decision: "Tier 0 violations are FAIL not WARN"
    date: 2026-02-13
    task: T-014
    rationale: "Consequential actions must never bypass task requirement"
    directives_served: [D1, D2]
    alternatives_rejected:
      - "WARN (too weak for Tier 0)"

  - id: D-005
    decision: "Git agent absorbs bypass log and hooks"
    date: 2026-02-13
    task: T-013
    rationale: "Coherent tool for all git enforcement rather than scattered scripts"
    directives_served: [D2, D3]
    alternatives_rejected:
      - "Separate bypass-log script"
      - "Standalone pre-commit hook"

  - id: D-006
    decision: "Falsifiability criteria defined"
    date: 2026-02-13
    task: T-009
    rationale: "Framework claims are now testable - we know what would prove the approach wrong"
    directives_served: [D1, D2]

  - id: D-007
    decision: "Primary audience: individual developers using AI agents"
    date: 2026-02-13
    task: T-010
    rationale: "Framework overhead only justified when AI context loss is the problem being solved"
    directives_served: [D3]

  - id: D-008
    decision: "Knowledge pyramid with 4 levels and graduation criteria"
    date: 2026-02-13
    task: T-011
    rationale: "Higher levels require more evidence and are harder to change - directives require human approval"
    directives_served: [D1, D2]
    alternatives_rejected:
      - "Flat structure (no graduation, all knowledge equal)"
      - "3 levels without directives (insufficient authority stratification)"

  - id: D-009
    decision: "Monitor context budget via token reading from JSONL transcript, not tool-call counting"
    date: 2026-02-14
    task: T-059
    rationale: "Tool calls are a garbage proxy — one call can consume 50 or 50,000 tokens. The Claude Code JSONL transcript contains actual token usage (message.usage) per API call. Tail + JSON parse takes 23ms on a 30MB file. Reading lags ~1 API call; conservative thresholds compensate."
    directives_served: [D1, D2]
    alternatives_rejected:
      - "Tool call counting (no correlation with actual context consumption)"
      - "Token estimation heuristics (fragile, provider-specific assumptions)"
      - "Time-based warnings (no correlation with context size)"

  - id: D-010
    decision: "Check tokens every 5th tool call, not every call"
    date: 2026-02-14
    task: T-059
    rationale: "23ms per check is fine but unnecessary overhead on every call. Every 5th gives ~5-minute granularity during active work, well within the warning buffer before compaction."
    directives_served: [D2, D3]
    alternatives_rejected:
      - "Every call (unnecessary overhead)"
      - "Every 10th (too infrequent near thresholds)"

  - id: D-011
    decision: "G-001 decision trigger has fired: plugins act as second agent and caused task bypass. Remediation tasks T-062 through T-066 created covering Tier C (tooling) and Tier D (ways of working) fixes."
    date: 2026-02-15
    task: T-061
    rationale: "4-agent investigation confirmed: 0/20 skills are task-aware, using-superpowers usurps framework authority, enforcement is git-commit-only, tier system is vaporware"
    directives_served: [D1, D2]
    alternatives_rejected:
      - "Accept plugin override as feature (violates Authority Model)"
      - "Remove all plugins (loses productivity gains)"

  - id: D-012
    decision: "Flask + htmx + Pico CSS with no build step for web UI"
    date: 2026-02-14
    task: T-045
    rationale: "Portability directive (D4) — no provider lock-in, no npm ecosystem. Single 14kb JS file, vendored dependencies, works fully offline."
    directives_served: [D3, D4]
    alternatives_rejected:
      - "React/Next.js"
      - "Svelte"
      - "Plain CGI"

  - id: D-013
    decision: "Files as source of truth for web UI — no database"
    date: 2026-02-14
    task: T-045
    rationale: "Framework already stores everything in YAML/MD — adding a DB duplicates data and creates sync problems"
    directives_served: [D2, D4]
    alternatives_rejected:
      - "SQLite cache"
      - "Redis"

  - id: D-014
    decision: "4-status task lifecycle: captured, started-work, issues, work-completed"
    date: 2026-02-14
    task: T-051
    rationale: "Evidence from 50 tasks showed 0 uses of 'refined' and 0 uses of 'blocked'. Issues covered all blocking scenarios. Transition validation added to prevent drift."
    directives_served: [D2, D3]
    alternatives_rejected:
      - "Keep all 6 statuses and add validation only"

  - id: D-015
    decision: "4 Flask blueprints (core, tasks, timeline, discovery) instead of monolith or per-route"
    date: 2026-02-14
    task: T-054
    rationale: "Routes naturally cluster by domain. Eliminates concurrent-modification risk (4 agents modifying app.py simultaneously). 13 separate files would be over-engineered."
    directives_served: [D2, D3]
    alternatives_rejected:
      - "Keep monolithic app.py"
      - "1 blueprint per route"

  - id: D-016
    decision: "PreToolUse hook blocks Write/Edit only, not Bash"
    date: 2026-02-15
    task: T-063
    rationale: "Bash is needed for task creation itself; blocking it creates a chicken-and-egg problem where you cannot create the task needed to unblock tools"
    directives_served: [D1, D2]
    alternatives_rejected:
      - "Block all tools (unworkable — cannot create tasks)"
      - "Block nothing (status quo — no enforcement)"

  - id: D-017
    decision: "fw work-on accepts both name strings (create new) and task IDs (resume existing) in one command"
    date: 2026-02-15
    task: T-064
    rationale: "Need to both create new tasks and resume existing ones; two separate commands would add friction. Single command makes compliance easier than non-compliance."
    directives_served: [D2, D3]
    alternatives_rejected:
      - "Separate commands for create vs resume"
      - "Only support task IDs (no inline creation)"

  - id: D-018
    decision: "Three-tier plugin classification (AWARE/SILENT/BYPASSING) with dual output: fw doctor check + standalone fw plugin-audit"
    date: 2026-02-15
    task: T-067
    rationale: "SILENT plugins (MCP tools, LSPs) need no action — only BYPASSING needs attention. Doctor check catches issues routinely; standalone gives detailed actionable output."
    directives_served: [D1, D2]
    alternatives_rejected:
      - "Binary AWARE/UNAWARE (too noisy — most plugins are harmlessly silent)"
      - "Doctor-only (no detail)"
      - "Standalone-only (not discoverable)"

  - id: D-019
    decision: "Tags over hierarchy for task grouping"
    date: 2026-02-16
    task: T-086
    rationale: "Flat tags are simpler, more flexible, and avoid taxonomy design. Epics/features add brittle coupling for single-agent work."

  - id: D-020
    decision: "Passive git metrics over manual estimation"
    date: 2026-02-16
    task: T-086
    rationale: "Manual story points meaningless for AI agents. Git data is objective. Learning loop comes from comparing similar completed tasks via fw metrics predict."

  - id: D-021
    decision: "Build dispatch infrastructure (protocol + templates + guidelines) instead of specialized agent types"
    date: 2026-02-17
    task: T-097
    rationale: "Cannot create new Claude Code agent types. Generic agents handle 7 of 8 dispatches. Real problem is ad-hoc result management causing context explosion (T-073). Standardize usage via CLAUDE.md protocol and prompt templates."

  - id: D-022
    decision: "Implement acceptance criteria gate and closed-task commit warning as mitigations for premature closure"
    date: 2026-02-17
    task: T-112
    rationale: "T-108 forensics showed work-completed is unvalidated flag. 5 governance violations found: premature closure, no update logging, post-closure commits allowed, stale episodic, orphaned decisions. Level D escalation — ways of working gap, not technique or tooling. Two highest-value mitigations: AC gate (prevents premature closure) and commit warning (makes post-closure work visible)."

  - id: D-023
    decision: "Hybrid task-file + git-mined episodic: git owns timeline/metrics/artifacts, task file owns AC + decisions only, episodic merges both automatically"
    date: 2026-02-17
    task: T-117
    rationale: "58% empty task files prove Updates-as-log failed. 97% git traceability proves commits are the natural authority. Hybrid respects both: git for what happened (immutable, code-linked), task file for why (decisions, rejected alternatives). Estimated context cost: 0-200 tokens/task vs 500+ for full logging."

  - id: D-024
    decision: "GO on hybrid episodic: git-mined + task-file AC/decisions. Validated on T-115, T-112, T-108, T-116. Zero [TODO]s for mechanical sections."
    date: 2026-02-17
    task: T-117
    rationale: "4-task validation proved: auto-complete for tasks with AC, git-derived for old-template tasks, full timeline/artifacts/challenges from git. Context cost: 1 bash call vs ~2000 tokens manual enrichment."

  - id: D-025
    decision: "GO on error-watchdog PostToolUse hook for Bash error detection. Two-layer enforcement: CLAUDE.md protocol (instructional) + error-watchdog.sh hook (structural). Detects high-confidence errors (exit 127, tracebacks, Permission denied) and injects investigation reminder. Conservative pattern list avoids false positives."
    date: 2026-02-17
    task: T-118
    rationale: "7 systematic instances across 3 root cause mechanisms. Hook is low overhead (~25ms), follows framework philosophy of structural > instructional enforcement."

  - id: D-026
    decision: "GO on result ledger (fw bus). Task-scoped YAML envelopes with 2KB size gating. T-073 simulation: 5 agents x 4.4KB, manifest is 500B (~97% savings). No new dependencies."
    date: 2026-02-17
    task: T-109
    rationale: "Formalizes existing 'write to disk, return summary' convention into protocol with automatic size gating. Prevents context explosion structurally."

  - id: D-027
    decision: "Disable compaction, rely on handovers (Option B)"
    scope: project
    date: 2026-02-18
    task: T-174
    rationale: "3-agent investigation: autoCompactEnabled:false already set, budget gate enforces at 150K, emergency handover auto-captures tasks/git/commits, compaction lossy summary inferior to structured handover. Rejected: Option A (causes T-145/T-148), Option C (CLI blocks), Option D (is Option B reframed)"

  - id: D-028
    decision: "Eliminate emergency/full handover distinction — single handover"
    scope: project
    date: 2026-02-18
    task: T-175
    rationale: "Crash resilience analysis proved task system is primary memory (~95% survives zero-handover crash). With budget gate at 170K leaving 30K, there is always room for full handover. Emergency skeleton was a safety net that is no longer needed — the task system (task files, git, episodic, project memory) IS the safety net."

  - id: D-029
    decision: "R-033 sovereignty gate: sticky owner (D) + completion block (A)"
    scope: project
    date: 2026-02-19
    task: T-198
    rationale: "Two-layer defense: D prevents circumvention, A blocks completion. Simple, auditable, bash-implementable. Rejected: B (too blunt), C (too complex)."

  - id: D-030
    decision: "Use dagre (layered DAG) as default graph layout instead of cose"
    scope: project
    date: 2026-02-21
    task: T-233
    rationale: "95 nodes + 140 edges with cose = cluttered hairball. Dagre produces clear top-to-bottom hierarchy showing subsystem structure. Compound parent nodes work well with dagre but break cose. Three modes offered: dagre-TB (default), dagre-LR, force-directed (cose without compounds)."

  - id: D-031
    decision: "Validate active task file existence in enforcement gate"
    scope: project
    date: 2026-02-21
    task: T-232
    rationale: "Non-empty CURRENT_TASK in focus.yaml is insufficient — completed tasks move to .tasks/completed/ but focus.yaml persists. Gate now does find .tasks/active/${CURRENT_TASK}-*.md to confirm the task is genuinely active. Closes a high-severity gap (G-013) where the core enforcement principle could be silently bypassed."

