# Concerns Register — Unified risk and gap tracking (T-397)
#
# Consolidates risks.yaml (forward-looking) and gaps.yaml (spec-reality)
# into a single register. Origin: T-396 Option D decision.
#
# Purpose: Track all concerns — things that ARE wrong (gaps) and things
# that COULD go wrong (risks) — in one audited, handover-surfaced,
# CLAUDE.md-referenced register.
#
# Checked by: audit agent (Section 8)
# Surfaced in: handover documents, /risks web page
# CLI: fw gaps (existing)
#
# Type values:
#   gap   — Spec-reality divergence (present tense: "this IS wrong")
#   risk  — Forward-looking concern (future tense: "this COULD go wrong")
#
# Status values:
#   watching         — concern identified, waiting for trigger
#   decided-build    — trigger fired, decided to build
#   decided-simplify — trigger fired, decided to simplify spec
#   decided-defer    — trigger evaluated, explicitly deferred again
#   closed           — resolved (built or simplified)
#
# Risk-specific optional fields (type: risk only):
#   likelihood: 1-5 (Rare/Unlikely/Possible/Likely/Almost certain)
#   impact: 1-5 (Negligible/Minor/Moderate/Major/Severe)
#   score: L × I
#   ranking: low|medium|high|urgent
#   controls: [CTL-XXX] from controls.yaml
#   residual_notes: What risk remains after controls

concerns:
