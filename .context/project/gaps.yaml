  - id: G-005
    title: "Graduation pipeline has no tooling"
    description: >
      015-Practices.md defines a graduation pipeline:
      task update → learning (2+ tasks) → practice (3+ applications) → directive.
      This pipeline is entirely manual. No counting, no promotion command,
      no detection of "this learning appeared in 3 tasks."
    spec_reference: "015-Practices.md §Graduation Criteria"
    severity: medium
    decision_trigger: >
      learnings.yaml has 20+ entries, OR a learning is missed that was
      applicable (context loss causes repeat failure).
    trigger_check:
      type: auto
      check: "grep -c '^  - id: L-' $PROJECT_ROOT/.context/project/learnings.yaml 2>/dev/null"
      threshold: ">= 20 means scale warrants automation"
    trigger_fired: true
    trigger_fired_date: 2026-02-16
    resolution: >
      Built fw promote (T-087) with three commands:
      - fw promote suggest: identifies learnings with 3+ applications
      - fw promote status: shows all learnings with application counts
      - fw promote L-XXX: promotes a learning to a practice
      Audit section 9 checks for promotion candidates when 20+ learnings exist.
      Application counting is deliberate (explicit L-XXX references) not fuzzy.
    evidence_collected: "21 learnings, 9 practices. Trigger threshold (20) exceeded. T-087 built full tooling."
    status: closed
    created: 2026-02-14
    last_reviewed: 2026-02-16
    closed_date: 2026-02-16

