# Gaps Register — Spec-Reality Gaps with Decision Triggers
#
# Purpose: Structural memory for things we chose NOT to build yet.
# Each gap has a trigger condition — when the trigger fires, we decide:
# build the feature, or simplify the spec.
#
# Checked by: audit agent (Section 8)
# Surfaced in: handover documents
#
# Status values:
#   watching         — gap identified, waiting for trigger
#   decided-build    — trigger fired, decided to build
#   decided-simplify — trigger fired, decided to simplify spec
#   decided-defer    — trigger evaluated, explicitly deferred again
#   closed           — resolved (built or simplified)

gaps:
  - id: G-001
    title: "Enforcement tiers are spec-only"
    description: >
      010-TaskSystem.md defines 4 enforcement tiers (Tier 0: never bypass,
      Tier 1: strict default, Tier 2: situational, Tier 3: pre-approved).
      Only Tier 1 is partially implemented (commit-msg hook requires T-XXX).
      No agent-level enforcement, no block-and-offer, no bypass tracking.
    spec_reference: "010-TaskSystem.md §Enforcement: The Four Tiers"
    severity: high
    why_not_now: >
      Zero evidence that lack of enforcement has caused harm. Single agent,
      single user, high discipline. Building gates for problems that haven't
      occurred is P-001 anti-pattern.
    decision_trigger: >
      First destructive action without a task on a real project, OR first
      time a second human/agent works in the framework and skips task creation.
    trigger_check:
      type: manual
      hint: "Check after each real-world project: did anyone bypass task creation?"
    evidence_needed: "At least 1 real-world project where consequential action lacks task ref"
    evidence_collected: "None — framework has only been used self-referentially"
    alternative_outcome: >
      If 3 projects pass without enforcement issues → simplify spec.
      Remove tiers 0-2 machinery, keep the commit hook, document it as sufficient.
    status: watching
    created: 2026-02-14
    last_reviewed: 2026-02-14

  - id: G-002
    title: "Status transitions not validated"
    description: >
      010-TaskSystem.md originally defined 6 statuses including 'refined' and
      'blocked'. After 50 tasks, neither was ever used. Simplified to 4 statuses
      (captured, started-work, issues, work-completed) with validated transitions.
    spec_reference: "010-TaskSystem.md §Task Statuses (Lifecycle)"
    severity: medium
    resolution: >
      Decided-simplify (T-051): Removed 'refined' and 'blocked' statuses.
      Added transition validation to update-task.sh. Updated spec, CLI, web UI.
      Legacy compat: old tasks with refined/blocked can transition to started-work.
    evidence_collected: >
      50 tasks: 0 used 'refined', 0 used 'blocked', 7 used 'issues'.
      Actual lifecycle was always: captured → started-work ↔ issues → work-completed.
    status: closed
    created: 2026-02-14
    last_reviewed: 2026-02-14
    closed_date: 2026-02-14

  - id: G-003
    title: "Unused frontmatter fields (priority, tags, agents.supporting)"
    description: >
      Task template had 11 frontmatter fields. Removed priority, tags,
      agents.primary, and agents.supporting from default template (T-052).
      workflow_type kept — it IS consumed by task list filtering and episodic tags.
    spec_reference: "010-TaskSystem.md §Task Fields Reference"
    severity: low
    resolution: >
      Decided-simplify (T-052): Removed priority, tags, agents from default template
      and create-task.sh. Existing tasks retain these fields (no migration needed).
      workflow_type retained as it has consumers (task list, web UI).
    evidence_collected: >
      50 tasks: all medium priority, tags almost always [], supporting agents always [].
    status: closed
    created: 2026-02-14
    last_reviewed: 2026-02-14
    closed_date: 2026-02-14

  - id: G-004
    title: "Multi-agent collaboration untested"
    description: >
      Spec describes primary + supporting agents on a single task, with all
      agents logging to the same update history. Never tested — every task
      has been single-owner, single-agent. agents.supporting is [] on all 41 tasks.
    spec_reference: "010-TaskSystem.md §Task-to-Agent Relationship"
    severity: low
    why_not_now: >
      Only one agent exists (claude-code). Can't test multi-agent patterns
      without multiple agents. Building coordination for a solo performer is waste.
    decision_trigger: >
      First project where two agents need to work on the same task.
    trigger_check:
      type: manual
      hint: "Check after each project: did two different agents work on the same task?"
    evidence_needed: "Actual multi-agent scenario"
    evidence_collected: "0 instances across 41 tasks"
    alternative_outcome: >
      If single-agent remains the pattern after 3 projects → simplify
      agents field to just 'owner', drop primary/supporting distinction.
    status: watching
    created: 2026-02-14
    last_reviewed: 2026-02-14

  - id: G-005
    title: "Graduation pipeline has no tooling"
    description: >
      015-Practices.md defines a graduation pipeline:
      task update → learning (2+ tasks) → practice (3+ applications) → directive.
      This pipeline is entirely manual. No counting, no promotion command,
      no detection of "this learning appeared in 3 tasks."
    spec_reference: "015-Practices.md §Graduation Criteria"
    severity: medium
    why_not_now: >
      Manual graduation works at current scale (8 learnings, 7 practices).
      Automation ROI kicks in at 30+ learnings when manual tracking breaks.
    decision_trigger: >
      learnings.yaml has 20+ entries, OR a learning is missed that was
      applicable (context loss causes repeat failure).
    trigger_check:
      type: auto
      check: "grep -c '^  - id: L-' $PROJECT_ROOT/.context/project/learnings.yaml 2>/dev/null"
      threshold: ">= 20 means scale warrants automation"
    evidence_needed: "Scale (20+ learnings) or missed application"
    evidence_collected: "Currently 8 learnings, 7 practices. Manual works fine."
    alternative_outcome: >
      If scale never comes → keep manual. Document that the pipeline
      is a thinking tool, not an automation target.
    status: watching
    created: 2026-02-14
    last_reviewed: 2026-02-14

  - id: G-006
    title: "Only default.md template exists"
    description: >
      Simplified default.md to match actual usage. Removed dead sections
      (Design Record, Specification Record, Test Files). Added single Context
      section. Spec-imagined workflow-specific templates not created.
    spec_reference: "010-TaskSystem.md §Location"
    severity: low
    resolution: >
      Decided-simplify (T-052): Simplified default.md to frontmatter + Context +
      Updates. Removed 3 dead sections and 3 unused frontmatter fields.
      If workflow-specific templates are needed, create from real need.
    evidence_collected: >
      50 tasks: Design Record, Spec Record, and Test Files sections were
      placeholder in every single task. Updates carried 100% of content.
    status: closed
    created: 2026-02-14
    last_reviewed: 2026-02-14
    closed_date: 2026-02-14
