  - id: G-007
    title: "Budget gate non-functional for shared-tooling projects"
    description: >
      budget-gate.sh, pre-compact.sh, and post-compact-resume.sh all used
      FRAMEWORK_ROOT for project-specific paths (.context/, .tasks/, JSONL
      transcripts). In shared-tooling mode (PROJECT_ROOT != FRAMEWORK_ROOT),
      this caused: (1) transcript discovery read the wrong project's tokens,
      (2) pre-compact reset the framework's counter instead of the project's,
      (3) post-compact resume injected framework context into project sessions,
      (4) stale critical status failed open on 4/5 tool calls. Net effect:
      budget monitoring was non-functional for sprechloop despite hooks being
      wired. Contributed to the 14-compaction cascade (L-050).
    spec_reference: "CLAUDE.md §Context Budget Management (P-009)"
    severity: high
    evidence_collected: >
      T-148 investigation: sprechloop had no .budget-status file. Manual test
      of budget-gate.sh with PROJECT_ROOT=/opt/001-sprechloop returned 124K
      tokens — from the framework's active session, not sprechloop's (which
      had no active session). 3 scripts affected: budget-gate.sh (transcript
      discovery + stale fail-open), pre-compact.sh (FRAMEWORK_ROOT reset),
      post-compact-resume.sh (FRAMEWORK_ROOT for all project reads). Audit of
      remaining agent scripts confirmed these were the only 3 affected — other
      scripts already use PROJECT_ROOT correctly.
    resolution: >
      T-149 fixed all 4 bugs: (1) transcript discovery scoped to project's
      Claude Code directory via path encoding, (2) pre-compact.sh uses
      PROJECT_ROOT for counter/status reset, (3) stale critical status still
      blocks (no fail-open at critical level), (4) post-compact-resume.sh uses
      PROJECT_ROOT for handover/tasks/git reads. Audit confirmed no remaining
      FRAMEWORK_ROOT misuse in other agent scripts.
    status: closed
    created: 2026-02-18
    last_reviewed: 2026-02-18
    closed_date: 2026-02-18

  - id: G-008
    title: "Sub-agent dispatch protocol has no structural enforcement"
    description: >
      CLAUDE.md §Sub-Agent Dispatch Protocol defines clear rules: investigators
      must keep returns under 2K tokens, prompts must include output format and
      write-to-file instructions, background agents should write to disk not
      return content. But nothing enforces this — an agent can launch 4 background
      Explore agents with "return a summary" prompts, call TaskOutput on all 4,
      and flood the context with 4×30K chars of raw JSONL transcript. This caused
      a 12-minute hang and effective session crash during T-158.
    spec_reference: "CLAUDE.md §Sub-Agent Dispatch Protocol"
    severity: medium
    evidence_collected: >
      T-158 (2026-02-18): 4 background Explore agents launched with prompts saying
      "Return structured summary. Keep under 2K tokens." TaskOutput returned raw
      JSONL transcripts at 30,156 chars each (120K total). Model produced 0 output
      tokens after ingesting this, then emitted stop_sequence with no content.
      Session effectively crashed for 12m40s. Root cause: (1) prompts didn't
      include write-to-file instructions per template rule, (2) TaskOutput returns
      raw transcript not agent final answer, (3) no hook or gate prevents this.

      T-170 (2026-02-18): Third instance — Playwright browser_navigate and
      browser_snapshot return full accessibility tree for all 168 kanban tasks
      (~30-50K tokens per call). 5+ calls in one session consumed 150K+ tokens,
      causing repeated compactions (15 emergency handovers in 24h). Same root
      cause: uncontrolled context intake from tool results. Mitigation: use
      browser_run_code for navigation, browser_take_screenshot for visuals,
      never browser_snapshot on pages with large DOM.
    decision_trigger: >
      Third instance of context explosion from uncontrolled tool output (T-073
      sub-agents, T-158 TaskOutput, T-170 Playwright snapshots). Pattern is
      confirmed: any tool that returns unbounded content will eventually crash
      the session. Discipline alone is proven insufficient across 3 incidents.
    trigger_fired: true
    trigger_fired_date: 2026-02-18
    trigger_check:
      type: manual
      hint: "Monitor for context spikes after Task tool dispatches or Playwright calls"
    possible_enforcement:
      - "PreToolUse hook on Task tool: warn if >3 parallel bg agents"
      - "PostToolUse hook on TaskOutput: warn if result >5K chars"
      - "Agent prompt linter: check for 'write to file' in bg agent prompts"
      - "Make fw bus post the ONLY way to return bg agent results"
      - "Practice: never use browser_snapshot/browser_navigate on data-heavy pages"
    status: closed
    closed_date: 2026-02-20
    resolution: >
      T-225 built PostToolUse hook (check-dispatch.sh) on Task|TaskOutput.
      Warns at 5K chars, critical at 20K chars. Combined with the dispatch
      preamble (T-217) and MEMORY.md rules, provides layered enforcement:
      documentation (CLAUDE.md), prompt injection (preamble.md), runtime
      guard (check-dispatch.sh). Remaining items (PreToolUse parallel count,
      prompt linter) are lower priority — can be added if incidents recur.
    created: 2026-02-18
    last_reviewed: 2026-02-20

  - id: G-009
    title: "Research artifact persistence has no structural enforcement"
    description: >
      Sub-agent dispatch protocol (CLAUDE.md) says content generators "MUST write to disk"
      and investigators should use fw bus. Reality: fw bus has NEVER been used (empty dirs).
      5+ agents dispatched in session S-2026-0218-1920 returned full content to orchestrator
      context — would have been lost without human intervention. L-055 validated that
      general-purpose agents CAN write to disk when instructed. The protocol exists but
      nothing enforces it. Related to G-008 (context explosion) but specifically about
      knowledge loss, not token management.
    severity: medium
    evidence:
      - "T-174: 3 agent outputs manually saved to docs/reports/ after user caught the gap"
      - "T-178 experiment: Explore agents can't write (read-only); general-purpose can"
      - ".context/bus/results/ and .context/bus/blobs/ both empty across 170+ tasks"
      - "fw bus designed (D-026), built (T-109), documented in CLAUDE.md — never used"
    trigger_check:
      type: count
      threshold: 3
      hint: "Monitor for sub-agent dispatches that don't persist results to disk"
    trigger_fired: true
    trigger_fired_date: 2026-02-18
    possible_enforcement:
      - "Use general-purpose agent type for all research (not Explore)"
      - "Orchestrator pre-defines output path and includes in prompt"
      - "Audit check: inception tasks must have docs/reports/ artifact"
      - "PostToolUse hook on Task: verify file was written if prompt included output path"
    status: closed
    closed_date: 2026-02-20
    resolution: >
      T-226 escalated the commit-msg hook research artifact check from warn to block.
      After the first inception commit, subsequent commits are blocked unless
      docs/reports/T-XXX-*.md exists on disk or in staged changes. Combined with
      C-001 guidance in CLAUDE.md, audit research section, and dispatch preamble (T-217),
      provides layered enforcement: documentation + commit gate + post-completion audit.
    related_task: T-178
    created: 2026-02-18
    last_reviewed: 2026-02-20

  - id: G-010
    title: "P-010 AC gate has no distinction between agent-verifiable and human-verifiable criteria"
    description: >
      The P-010 acceptance criteria gate in update-task.sh counts ALL checkboxes
      under ## Acceptance Criteria and blocks work-completed if any are unchecked.
      For tasks with behavior ACs (UI/UX criteria requiring human observation), this
      creates a perverse incentive: agents check behavior boxes based on code existence
      rather than observed behavior, because leaving them unchecked blocks completion.
      Discovered via sprechloop G-006 (T-057: 7 of 8 behavior ACs checked by agent
      without human verification).
    spec_reference: "CLAUDE.md §Verification Before Completion, §Enforcement Tiers"
    severity: high
    evidence_collected: >
      Sprechloop T-057: 7/8 ACs described user-observable behavior, all checked by
      agent based on code written. Task marked work-completed, both gates passed.
      Also likely T-054 (1 behavior AC) and T-055 (2 behavior ACs). Systemic for
      any project with UI/UX tasks.
    resolution: >
      T-192 inception: GO decision for Option A (AC tagging). ### Agent / ### Human
      section headers in AC section. P-010 gates only on ### Agent ACs. Tasks with
      unchecked ### Human ACs stay in active/ with owner: human (not moved to completed/).
      Discoverability via fw task verify command + web UI cockpit attention section.
      Backward compatible: tasks without headers work as before.
      T-193 built the implementation. T-216 added placeholder detection on top.
      Validated across T-215, T-218, T-219 — all used Agent/Human split correctly,
      human ACs stayed unchecked until human sign-off, partial-complete flow worked.
    related_task: T-192
    status: closed
    created: 2026-02-19
    last_reviewed: 2026-02-20
    closed_date: 2026-02-20

  - id: G-011
    title: "PostToolUse hooks are advisory-only — cannot block actions"
    description: >
      Claude Code PostToolUse hooks always exit 0 (advisory). Error-watchdog.sh
      and check-dispatch.sh can warn but not prevent the agent from ignoring errors
      or dispatching too many agents. The agent can proceed without investigating
      after error-watchdog fires. Architecturally limited by Claude Code hook design.
    spec_reference: "CLAUDE.md §Enforcement Tiers"
    severity: low
    why_not_now: >
      PostToolUse hooks see results (post-action), PreToolUse sees intent (pre-action).
      Cannot promote most PostToolUse checks to PreToolUse because the information
      needed (exit codes, output size) only exists after execution. CLAUDE.md behavioral
      rules remain the primary control for post-action compliance.
    decision_trigger: >
      Agent repeatedly ignores error-watchdog warnings (3+ instances in one session)
      and the resulting bug requires >1 hour to fix.
    trigger_check:
      type: manual
      hint: "Monitor for sessions where error-watchdog fired but agent proceeded without investigating"
    evidence_collected: "T-228 analysis: B-009. No known incidents of ignoring warnings causing major damage."
    status: watching
    created: 2026-02-21
    last_reviewed: 2026-02-21
    related_task: T-228

  - id: G-012
    title: "NotebookEdit and other side-effect tools not covered by PreToolUse task gate"
    description: >
      The PreToolUse task gate (check-active-task.sh) only fires for Write|Edit per the
      settings.json matcher. NotebookEdit, WebFetch, and MCP tools can produce side effects
      without task context. check-active-task.sh was updated to handle notebook_path (T-230),
      but the settings.json matcher still needs updating to include NotebookEdit.
    spec_reference: "CLAUDE.md §Enforcement Tiers"
    severity: low
    evidence_collected: "T-228 analysis: B-012. fw doctor now warns about this gap."
    resolution: >
      Accepted risk. This project has no Jupyter notebooks and no foreseeable use case.
      NotebookEdit would only matter in a data science project using the framework.
      If a future project needs it, they add NotebookEdit to their own settings.json matcher.
    status: closed
    created: 2026-02-21
    last_reviewed: 2026-02-21
    closed_date: 2026-02-21
    related_task: T-230

  - id: G-013
    title: "Task gate accepts completed task IDs — no active-file validation"
    description: >
      check-active-task.sh only checked if CURRENT_TASK was non-empty in focus.yaml.
      It did not verify the task file exists in .tasks/active/. A completed task ID
      left in focus.yaml passed the gate, allowing Write/Edit without an active task.
      Discovered when T-012 (completed) remained in focus across sessions.
    spec_reference: "CLAUDE.md §Enforcement Tiers — Tier 1"
    severity: high
    evidence_collected: "Session S-2026-0221: T-012 completed but still in focus, all edits allowed"
    resolution: >
      Added active-file validation after reading CURRENT_TASK. The gate now does
      find .tasks/active/${CURRENT_TASK}-*.md and blocks if no match found.
    status: closed
    created: 2026-02-21
    last_reviewed: 2026-02-21
    closed_date: 2026-02-21
    related_task: T-232

  - id: G-014
    title: "Built-in EnterPlanMode bypasses all framework governance"
    description: >
      Claude Code's built-in EnterPlanMode tool bypasses framework governance:
      no task gate, no session init, no research artifacts, and its system prompt
      says "This supercedes any other instructions" — overriding CLAUDE.md rules.
      Plan files go to .claude/plans/ (untracked, ephemeral) instead of docs/plans/.
      Post-plan execution creates bias that skips commit cadence and check-ins.
    spec_reference: "CLAUDE.md §Plan Mode Prohibition, §Instruction Precedence"
    severity: high
    evidence_collected: >
      T-241 implementation: entered plan mode, skipped fw context init, skipped
      LATEST.md, implemented all 7 steps in one batch, no task updates recorded,
      no commit cadence followed. The only gate that fired was check-active-task.sh
      blocking the first edit (Tier 1), but everything before that was ungoverned.
    resolution: >
      T-242 multi-layer defense:
      Layer 1 (agent discipline): CLAUDE.md §Plan Mode Prohibition — explicit rule
      to never use EnterPlanMode, with /plan as the governed alternative.
      Layer 2 (structural): PreToolUse hook on EnterPlanMode matcher with
      block-plan-mode.sh (exit 2). CONFIRMED working — tested after session restart,
      hook fires and blocks with exit code 2.
      Layer 3 (gap registration): This entry.
    status: closed
    created: 2026-02-22
    last_reviewed: 2026-02-22
    closed_date: 2026-02-22
    related_task: T-242

  - id: G-015
    title: "Sub-agent results bypass task governance — no structural linking"
    description: >
      Sub-agents dispatched via Claude Code's Task tool write results to /tmp/fw-agent-*.md
      (outside PROJECT_ROOT). These writes: (1) bypass check-active-task.sh (path outside project),
      (2) don't trigger PreToolUse hooks (sub-agent context), (3) are never registered against
      the active task via fw bus or any other mechanism. Research artifacts exist in an
      ungoverned limbo until manually linked. fw bus (lib/bus.sh, 365 lines) was built for
      exactly this use case but has zero usage across 170+ tasks (tracked as G-009).
    spec_reference: "CLAUDE.md §Sub-Agent Dispatch Protocol, §Result Ledger (fw bus)"
    severity: medium
    trigger_condition: >
      Sub-agent results are lost or must be manually linked for the 3rd time.
      T-329 (article review) is occurrence #1. T-073 (episodic enrichment) was a near-miss.
    evidence_collected: >
      T-329: 5 review agents wrote to /tmp/fw-agent-*-review.md. Active task T-329 had
      no reference until manual consolidation to docs/reports/T-329-article-review.md.
      MEMORY.md prescribes old /tmp/ pattern (stale, predates fw bus). CLAUDE.md prescribes
      fw bus post (never enforced). G-009 confirms bus has zero adoption.
      T-073: 9 agents returned full content in-context, 177K spike.
      T-178 inception identified bus has zero adoption, recommended simplification.
      Learnings L-025, L-053, L-055, L-057 all document result management failures.
    suggested_resolution: >
      Short term: Update MEMORY.md to reference fw bus post. Medium term: Add audit check
      for orphaned /tmp/fw-agent-* files without bus entries. Long term: PostToolUse hook
      on Task tool that auto-links results. Pragmatic: Accept docs/reports/T-XXX-* as
      de facto standard and add task-update hook that checks for matching report files.
    status: watching
    created: 2026-03-06
    last_reviewed: 2026-03-06
    related_task: T-329

  - id: G-016
    title: "Learning capture has no structural trigger for bugfix tasks"
    description: >
      72% of bugfix tasks (31/43) produce zero learning entries. Learning capture
      relies entirely on behavioral rules (CLAUDE.md guidance, session capture
      checklist) which are consistently skipped during ops-heavy fix cycles.
      update-task.sh auto-captures decisions on work-completed but NOT learnings.
      healing resolve captures both but is designed for issues->recovery flow,
      not fix-commit-complete. Concrete cost: T-030 (portability fix, 2026-02-13,
      no learning) -> T-344 (same class, 2026-03-08, 23 days later, 3 fix-retag
      cycles that could have been anticipated).
    spec_reference: "CLAUDE.md §Error Escalation Ladder, §Session End Protocol"
    severity: medium
    evidence_collected: >
      43 bugfix tasks in completed/: 12 with learnings (28%), 31 without (72%).
      T-344 had 3 macOS compat bugs, all fixed, no learnings until human called
      it out. T-030 (same bug class) also had no learnings. healing resolve was
      never invoked during T-344. Session handover had [TODO] placeholders.
      Audit section 5 checks practice count but not bugfix-to-learning ratio.
    decision_trigger: >
      Same bug class reappears 3rd time without a connecting learning entry.
      Or: bugfix-to-learning ratio stays below 35% for 20+ additional bugfix tasks.
    trigger_check:
      type: manual
      hint: "Review bugfix tasks at session end — did field-discovered bugs produce learnings?"
    possible_resolution:
      - "Behavioral: Bug-Fix Learning Checkpoint practice in CLAUDE.md (DONE)"
      - "Detective: Audit section 5 checks bugfix-learning coverage ratio"
      - "Preventive: fw fix-learned shortcut for fast capture during fix cycles"
      - "Structural: update-task.sh prompts for learning when completing bugfix tasks"
    status: watching
    created: 2026-03-08
    last_reviewed: 2026-03-08
    related_task: T-345

  - id: G-017
    title: "Execution gates do not cover proposal/suggestion layer"
    description: >
      Four structural gates (R-033, P-010, T-193, CLAUDE.md rules) protect
      task completion execution. But agents can freely suggest --force bypass
      or batch-completion of human-owned tasks without triggering any gate.
      The proposal/suggestion phase is ungated. An agent suggested batch-closing
      12 human-owned tasks with --force without reviewing any Human ACs.
      The sovereignty gate blocked execution but not the suggestion itself.
    spec_reference: "CLAUDE.md §Autonomous Mode Boundaries, §Blind Completion Anti-Pattern"
    severity: medium
    evidence_collected: >
      T-372: Agent proposed batch 'fw task update T-XXX --status work-completed --force'
      for 12 human-owned tasks. 4 had blocking Human ACs (T-289 prod pipeline,
      T-331 untested action, T-364 doc quality, T-366 AI tone). R-033 gate
      blocked execution; nothing blocked the suggestion. fw task verify already
      existed but agent didn't use it.
    decision_trigger: >
      Agent bypasses the behavioral rule (CLAUDE.md §Blind Completion Anti-Pattern)
      and suggests --force for human-owned tasks again. Or: 2+ human-owned tasks
      are completed via --force without Human AC review in a single session.
    trigger_check:
      type: manual
