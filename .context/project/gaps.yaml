  - id: G-007
    title: "Budget gate non-functional for shared-tooling projects"
    description: >
      budget-gate.sh, pre-compact.sh, and post-compact-resume.sh all used
      FRAMEWORK_ROOT for project-specific paths (.context/, .tasks/, JSONL
      transcripts). In shared-tooling mode (PROJECT_ROOT != FRAMEWORK_ROOT),
      this caused: (1) transcript discovery read the wrong project's tokens,
      (2) pre-compact reset the framework's counter instead of the project's,
      (3) post-compact resume injected framework context into project sessions,
      (4) stale critical status failed open on 4/5 tool calls. Net effect:
      budget monitoring was non-functional for sprechloop despite hooks being
      wired. Contributed to the 14-compaction cascade (L-050).
    spec_reference: "CLAUDE.md §Context Budget Management (P-009)"
    severity: high
    evidence_collected: >
      T-148 investigation: sprechloop had no .budget-status file. Manual test
      of budget-gate.sh with PROJECT_ROOT=/opt/001-sprechloop returned 124K
      tokens — from the framework's active session, not sprechloop's (which
      had no active session). 3 scripts affected: budget-gate.sh (transcript
      discovery + stale fail-open), pre-compact.sh (FRAMEWORK_ROOT reset),
      post-compact-resume.sh (FRAMEWORK_ROOT for all project reads). Audit of
      remaining agent scripts confirmed these were the only 3 affected — other
      scripts already use PROJECT_ROOT correctly.
    resolution: >
      T-149 fixed all 4 bugs: (1) transcript discovery scoped to project's
      Claude Code directory via path encoding, (2) pre-compact.sh uses
      PROJECT_ROOT for counter/status reset, (3) stale critical status still
      blocks (no fail-open at critical level), (4) post-compact-resume.sh uses
      PROJECT_ROOT for handover/tasks/git reads. Audit confirmed no remaining
      FRAMEWORK_ROOT misuse in other agent scripts.
    status: closed
    created: 2026-02-18
    last_reviewed: 2026-02-18
    closed_date: 2026-02-18

  - id: G-008
    title: "Sub-agent dispatch protocol has no structural enforcement"
    description: >
      CLAUDE.md §Sub-Agent Dispatch Protocol defines clear rules: investigators
      must keep returns under 2K tokens, prompts must include output format and
      write-to-file instructions, background agents should write to disk not
      return content. But nothing enforces this — an agent can launch 4 background
      Explore agents with "return a summary" prompts, call TaskOutput on all 4,
      and flood the context with 4×30K chars of raw JSONL transcript. This caused
      a 12-minute hang and effective session crash during T-158.
    spec_reference: "CLAUDE.md §Sub-Agent Dispatch Protocol"
    severity: medium
    evidence_collected: >
      T-158 (2026-02-18): 4 background Explore agents launched with prompts saying
      "Return structured summary. Keep under 2K tokens." TaskOutput returned raw
      JSONL transcripts at 30,156 chars each (120K total). Model produced 0 output
      tokens after ingesting this, then emitted stop_sequence with no content.
      Session effectively crashed for 12m40s. Root cause: (1) prompts didn't
      include write-to-file instructions per template rule, (2) TaskOutput returns
      raw transcript not agent final answer, (3) no hook or gate prevents this.

      T-170 (2026-02-18): Third instance — Playwright browser_navigate and
      browser_snapshot return full accessibility tree for all 168 kanban tasks
      (~30-50K tokens per call). 5+ calls in one session consumed 150K+ tokens,
      causing repeated compactions (15 emergency handovers in 24h). Same root
      cause: uncontrolled context intake from tool results. Mitigation: use
      browser_run_code for navigation, browser_take_screenshot for visuals,
      never browser_snapshot on pages with large DOM.
    decision_trigger: >
      Third instance of context explosion from uncontrolled tool output (T-073
      sub-agents, T-158 TaskOutput, T-170 Playwright snapshots). Pattern is
      confirmed: any tool that returns unbounded content will eventually crash
      the session. Discipline alone is proven insufficient across 3 incidents.
    trigger_fired: true
    trigger_fired_date: 2026-02-18
    trigger_check:
      type: manual
      hint: "Monitor for context spikes after Task tool dispatches or Playwright calls"
    possible_enforcement:
      - "PreToolUse hook on Task tool: warn if >3 parallel bg agents"
      - "PostToolUse hook on TaskOutput: warn if result >5K chars"
      - "Agent prompt linter: check for 'write to file' in bg agent prompts"
      - "Make fw bus post the ONLY way to return bg agent results"
      - "Practice: never use browser_snapshot/browser_navigate on data-heavy pages"
    status: decided-build
    created: 2026-02-18
    last_reviewed: 2026-02-18

  - id: G-009
    title: "Research artifact persistence has no structural enforcement"
    description: >
      Sub-agent dispatch protocol (CLAUDE.md) says content generators "MUST write to disk"
      and investigators should use fw bus. Reality: fw bus has NEVER been used (empty dirs).
      5+ agents dispatched in session S-2026-0218-1920 returned full content to orchestrator
      context — would have been lost without human intervention. L-055 validated that
      general-purpose agents CAN write to disk when instructed. The protocol exists but
      nothing enforces it. Related to G-008 (context explosion) but specifically about
      knowledge loss, not token management.
    severity: medium
    evidence:
      - "T-174: 3 agent outputs manually saved to docs/reports/ after user caught the gap"
      - "T-178 experiment: Explore agents can't write (read-only); general-purpose can"
      - ".context/bus/results/ and .context/bus/blobs/ both empty across 170+ tasks"
      - "fw bus designed (D-026), built (T-109), documented in CLAUDE.md — never used"
    trigger_check:
      type: count
      threshold: 3
      hint: "Monitor for sub-agent dispatches that don't persist results to disk"
    trigger_fired: true
    trigger_fired_date: 2026-02-18
    possible_enforcement:
      - "Use general-purpose agent type for all research (not Explore)"
      - "Orchestrator pre-defines output path and includes in prompt"
      - "Audit check: inception tasks must have docs/reports/ artifact"
      - "PostToolUse hook on Task: verify file was written if prompt included output path"
    status: decided-build
    related_task: T-178
    created: 2026-02-18
    last_reviewed: 2026-02-18

  - id: G-010
    title: "P-010 AC gate has no distinction between agent-verifiable and human-verifiable criteria"
    description: >
      The P-010 acceptance criteria gate in update-task.sh counts ALL checkboxes
      under ## Acceptance Criteria and blocks work-completed if any are unchecked.
      For tasks with behavior ACs (UI/UX criteria requiring human observation), this
      creates a perverse incentive: agents check behavior boxes based on code existence
      rather than observed behavior, because leaving them unchecked blocks completion.
      Discovered via sprechloop G-006 (T-057: 7 of 8 behavior ACs checked by agent
      without human verification).
    spec_reference: "CLAUDE.md §Verification Before Completion, §Enforcement Tiers"
    severity: high
    evidence_collected: >
      Sprechloop T-057: 7/8 ACs described user-observable behavior, all checked by
      agent based on code written. Task marked work-completed, both gates passed.
      Also likely T-054 (1 behavior AC) and T-055 (2 behavior ACs). Systemic for
      any project with UI/UX tasks.
    resolution: >
      T-192 inception: GO decision for Option A (AC tagging). ### Agent / ### Human
      section headers in AC section. P-010 gates only on ### Agent ACs. Tasks with
      unchecked ### Human ACs stay in active/ with owner: human (not moved to completed/).
      Discoverability via fw task verify command + web UI cockpit attention section.
      Backward compatible: tasks without headers work as before.
      T-193 built the implementation. T-216 added placeholder detection on top.
      Validated across T-215, T-218, T-219 — all used Agent/Human split correctly,
      human ACs stayed unchecked until human sign-off, partial-complete flow worked.
    related_task: T-192
    status: closed
    created: 2026-02-19
    last_reviewed: 2026-02-20
    closed_date: 2026-02-20
