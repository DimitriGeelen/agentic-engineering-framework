# Gaps Register — Spec-Reality Gaps with Decision Triggers
#
# Purpose: Structural memory for things we chose NOT to build yet.
# Each gap has a trigger condition — when the trigger fires, we decide:
# build the feature, or simplify the spec.
#
# Checked by: audit agent (Section 8)
# Surfaced in: handover documents
#
# Status values:
#   watching         — gap identified, waiting for trigger
#   decided-build    — trigger fired, decided to build
#   decided-simplify — trigger fired, decided to simplify spec
#   decided-defer    — trigger evaluated, explicitly deferred again
#   closed           — resolved (built or simplified)

gaps:
  - id: G-001
    title: "Enforcement tiers — Tier 1 implemented, Tier 0 remains spec-only"
    description: >
      010-TaskSystem.md defines 4 enforcement tiers. Trigger fired: third-party
      plugins (acting as second agent) caused task-first bypass (T-061 investigation).
      Tier 1 now implemented via PreToolUse hook (T-063) + fw work-on (T-064).
      Tier 0 (consequential actions) still spec-only — needs Bash command parsing.
    spec_reference: "010-TaskSystem.md §Enforcement: The Four Tiers"
    severity: medium
    trigger_fired: true
    trigger_event: >
      T-061: Third-party plugins (superpowers, feature-dev, etc.) acted as
      second agent and caused task creation bypass. 0/20 loaded skills were
      task-aware. Investigation confirmed by 4 parallel analysis agents.
    resolution_in_progress: >
      T-062: Instruction precedence in CLAUDE.md (DONE)
      T-063: PreToolUse hook blocks Write/Edit without active task (DONE)
      T-064: fw work-on single-step gate command (DONE)
      T-065: /start-work command for plugin integration (DONE)
      T-067: Plugin onboarding audit process (DONE)
      Remaining: Tier 0 Bash enforcement for destructive commands
    what_works_now: >
      Tier 1: PreToolUse hook blocks Write/Edit without active task in focus.yaml.
      Exempt paths: .context/, .tasks/, .claude/, .git/.
      Agent gets clear error with instructions to create task.
      Git commit-msg hook still enforces T-XXX pattern at commit time.
      CLAUDE.md instruction precedence resolves plugin authority conflicts.
    what_remains: >
      Tier 2: No formal bypass logging mechanism beyond git --no-verify.
      Tier 3: Pre-approved categories exist in spec but not consumed by enforcement.
    tier0_resolution: >
      T-092 (2026-02-16): Built check-tier0.sh PreToolUse hook for Bash tool.
      Detects: force push, hard reset, git clean, branch -D, rm -rf /, DROP TABLE,
      TRUNCATE, docker system prune, kubectl delete namespace.
      Approval flow: fw tier0 approve (one-time, 5-min expiry, logged to bypass-log.yaml).
      47/47 pattern tests passing. Fast path: keyword pre-filter avoids Python overhead
      for 95%+ of safe commands. T-094 added heredoc false-positive prevention.
    resolution: >
      All decided-build enforcement work complete:
      Tier 0: check-tier0.sh (T-092, T-094) — destructive Bash command guard
      Tier 1: check-active-task.sh (T-063) — Write/Edit blocked without active task
      Tier 2: Partial — bypass logging exists via git agent, not yet formalized
      Tier 3: Spec only — pre-approved categories not yet consumed by enforcement
      Tiers 2+3 are low priority and tracked informally.
    status: closed
    created: 2026-02-14
    last_reviewed: 2026-02-17
    trigger_fired_date: 2026-02-15
    closed_date: 2026-02-17

