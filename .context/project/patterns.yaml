# Project Memory - Patterns
# Accumulated patterns from working on this project.
# Grows over time as we learn from tasks.

failure_patterns:
  - id: FP-001
    pattern: "Timestamp update loop"
    description: "Updating task timestamps on every commit causes endless uncommitted changes"
    learned_from: T-013
    date_learned: 2026-02-13
    mitigation: "Only update timestamps for active tasks, not completed ones"
    escalation_step: A
    occurrences_at_step: 0
    last_escalated: null

  - id: FP-002
    pattern: "sed returns malformed integers"
    description: "Complex sed commands for counting return output with newlines"
    learned_from: T-014
    date_learned: 2026-02-13
    mitigation: "Use simpler grep -c and pipe through tr -d to clean"
    escalation_step: A
    occurrences_at_step: 0
    last_escalated: null

  - id: FP-003
    pattern: "dependency-version-conflict"
    description: "Package version conflicts prevent installation when project has pinned dependencies"
    learned_from: T-026
    date_learned: 2026-02-13
    mitigation: "Use built-in PyYAML validation instead of yaml_validator to avoid dependency conflicts"
    escalation_step: A
    occurrences_at_step: 0
    last_escalated: null

  - id: FP-004
    pattern: "Context exhaustion before handover"
    description: "72 tool calls consumed context. Agent outputs (268K-532K bytes each) were the primary consumer. Handover was a skeleton with [TODO] placeholders — useless for recovery."
    learned_from: T-059
    date_learned: 2026-02-14
    mitigation: "Token-aware monitoring from JSONL transcript (D-009). Warns at 100K/130K/150K of 200K window. Falls back to tool-call counting when transcript unavailable."
    escalation_step: A
    occurrences_at_step: 0
    last_escalated: null

  - id: FP-005
    pattern: "Plugin authority override bypasses framework governance"
    description: "Third-party plugins using authority-claiming language ('YOU MUST', 'BEFORE ANY response') override CLAUDE.md framework rules. 0/20 loaded skills referenced task creation. Caused 3 task-first bypasses in a single session."
    learned_from: T-061
    date_learned: 2026-02-15
    mitigation: "Three-layer fix: (1) Instruction precedence in CLAUDE.md (T-062), (2) PreToolUse structural gate (T-063), (3) Plugin audit tool for ongoing detection (T-067)"
    escalation_step: D
    occurrences_at_step: 0
    last_escalated: null


  - id: FP-006
    pattern: "Premature task closure with post-closure drift"
    description: "Premature task closure with post-closure drift"
    learned_from: T-112
    date_learned: 2026-02-17
    mitigation: "M-1: Acceptance criteria gate in update-task.sh. M-2: Closed task commit warning in commit-msg hook. M-3: Episodic refresh on post-closure commits."

success_patterns:
  - id: SP-001
    pattern: "Phased implementation"
    description: "Breaking large changes into numbered phases improves traceability"
    learned_from: T-014
    date_learned: 2026-02-13
    context: "5-phase audit improvement was easier to review and commit"
    escalation_step: A
    occurrences_at_step: 0
    last_escalated: null

  - id: SP-002
    pattern: "Hybrid agent architecture"
    description: "Bash scripts for mechanical work + AGENT.md for intelligence"
    learned_from: T-002
    date_learned: 2026-02-13
    context: "Scripts are reliable, AGENT.md provides judgment guidance"
    escalation_step: A
    occurrences_at_step: 0
    last_escalated: null

  - id: SP-003
    pattern: "Commit early, commit often"
    description: "Frequent commits preserve work even when session context is lost. Each commit is a recovery point."
    learned_from: T-059
    date_learned: 2026-02-14
    context: "Despite losing all context, all code changes were preserved because Phase 1 and Phase 2 were committed before exhaustion"
    escalation_step: A
    occurrences_at_step: 0
    last_escalated: null

  - id: SP-004
    pattern: "Graduated enforcement: detect-then-prevent"
    description: "Build detective controls first (audit), then preventive controls (hooks/gates). Evidence from detective controls justifies and shapes preventive ones."
    learned_from: T-061
    date_learned: 2026-02-15
    context: "T-061 investigation (detective) provided evidence for T-063 PreToolUse hook (preventive). T-024 experiment proved both layers are needed — audit alone catches drift, hooks alone prevent it."
    escalation_step: A
    occurrences_at_step: 0
    last_escalated: null

antifragile_patterns:
  - id: AF-001
    pattern: "Failure-driven capability acquisition"
    description: "Context exhaustion killed a session → post-mortem revealed token data in JSONL → built token-aware monitoring that didn't exist before. The system is now stronger than if the failure never occurred."
    learned_from: T-059
    date_learned: 2026-02-14
    trigger: "Session context exhaustion with stale handover"
    capability_gained: "Real-time context budget monitoring with graduated warnings"
    directive: D1 (Antifragility)
    escalation_ladder: "A (don't repeat) → B (improve technique: token reading) → C (improve tooling: checkpoint.sh) → D (change ways of working: P-009 practice)"
    escalation_step: A
    occurrences_at_step: 0
    last_escalated: null

workflow_patterns:
  - id: WP-001
    pattern: "Task absorption"
    description: "Related small tasks can be absorbed into a larger coherent task"
    learned_from: T-013
    date_learned: 2026-02-13
    example: "T-003 and T-004 absorbed into T-013 (git agent)"
    escalation_step: A
    occurrences_at_step: 0
    last_escalated: null

  - id: WP-002
    pattern: "Experiment protocol: baseline-disable-measure-restore"
    description: "To validate that an enforcement mechanism is load-bearing: establish a baseline metric, disable the mechanism, perform operations, measure degradation, restore the mechanism. Produces unambiguous evidence."
    learned_from: T-024
    date_learned: 2026-02-13
    example: "E-004 disabled git hook, made 5 commits, traceability dropped 97% to 88%. Proved hooks are load-bearing, not theater."
    escalation_step: A
    occurrences_at_step: 0
    last_escalated: null
