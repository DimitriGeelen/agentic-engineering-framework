- target: agents/context/post-compact-resume.sh
  type: triggers
  note: SessionStart lifecycle hook (compact, resume)
depended_by: []
coupling: soft
coupling_note: "Hook format is Claude Code-specific. Hooks snapshot at session start — runtime edits require restart."

