# Watchtower CI/CD buildspec (Swarm pattern)
# IMPORTANT: version MUST be 37 (OneDev internal migration level)
# IMPORTANT: ASCII-only comments (no UTF-8 arrows or dashes)
version: 37
jobs:
  # =========================================================================
  # PRODUCTION DEPLOYMENT (v* tags)
  # =========================================================================
  - name: Build and Deploy Production
    steps:
      - !CheckoutStep
        name: Checkout
        cloneCredential: !DefaultCredential {}
        withLfs: false
        withSubmodules: false
        condition: ALL_PREVIOUS_STEPS_WERE_SUCCESSFUL

      - !CommandStep
        name: Build Docker Image
        runInContainer: true
        image: docker:27-cli
        interpreter: !DefaultInterpreter
          commands: |
            # L-BUILD-01: Use dedicated build container (CT 400) for isolation
            export DOCKER_HOST=tcp://docker-builder.ring20.geelenandcompany.com:2375

            VERSION=$(date +%Y%m%d-%H%M%S)
            REGISTRY=192.168.10.201:5000

            APP_IMAGE=watchtower
            echo "Building ${APP_IMAGE}:${VERSION} (PRODUCTION)"
            docker build -t ${REGISTRY}/${APP_IMAGE}:${VERSION} -f Dockerfile .
            docker tag ${REGISTRY}/${APP_IMAGE}:${VERSION} ${REGISTRY}/${APP_IMAGE}:latest
            docker push ${REGISTRY}/${APP_IMAGE}:${VERSION}
            docker push ${REGISTRY}/${APP_IMAGE}:latest

            # L-CICD-05: Verify push
            sleep 2
            if ! wget -q -O - "http://${REGISTRY}/v2/${APP_IMAGE}/tags/list" 2>/dev/null | grep -q "${VERSION}"; then
              echo "ERROR: Image push verification failed!"
              exit 1
            fi
            echo "Image push verified: ${APP_IMAGE}:${VERSION}"

            echo ${VERSION} > /onedev-build/version.txt
        useTTY: true
        condition: ALL_PREVIOUS_STEPS_WERE_SUCCESSFUL

      - !CommandStep
        name: Deploy App to Swarm
        runInContainer: true
        image: docker:27-cli
        interpreter: !DefaultInterpreter
          commands: |
            # L-CICD-21: Use host-networked helper to reach Swarm manager.
            export DOCKER_HOST=tcp://docker-builder.ring20.geelenandcompany.com:2375

            VERSION=$(cat /onedev-build/version.txt)
            APP_IMAGE=watchtower
            REGISTRY=192.168.10.201:5000
            SWARM_SERVICE=watchtower_app
            SWARM_MANAGER=192.168.10.201

            echo "Deploying ${APP_IMAGE}:${VERSION} to Swarm (PRODUCTION)"

            docker run --rm --network host docker:27-cli sh -c "
              export DOCKER_HOST=tcp://${SWARM_MANAGER}:2375

              echo 'Updating Swarm service...'
              docker service update \
                --image ${REGISTRY}/${APP_IMAGE}:${VERSION} \
                ${SWARM_SERVICE}

              echo 'Waiting for rolling update to converge...'
              for i in \$(seq 1 30); do
                RUNNING=\$(docker service ps ${SWARM_SERVICE} \
                  --filter desired-state=running \
                  --format '{{.CurrentState}}' | grep -c 'Running')
                if [ \"\$RUNNING\" -ge 2 ]; then
                  echo \"App service converged: \${RUNNING} replicas running\"
                  exit 0
                fi
                if [ \"\$i\" = '30' ]; then
                  echo 'ERROR: Swarm rolling update did not converge in 60s'
                  docker service ps ${SWARM_SERVICE}
                  exit 1
                fi
                sleep 2
              done
            "

            echo "Production deployment complete"
        useTTY: true
        condition: ALL_PREVIOUS_STEPS_WERE_SUCCESSFUL

    triggers:
      - !TagCreateTrigger
        tags: v*
    retryCondition: never
    maxRetries: 3
    retryDelay: 30
    timeout: 1800

  # =========================================================================
  # DEVELOPMENT DEPLOYMENT (develop branch)
  # =========================================================================
  - name: Build and Deploy Development
    steps:
      - !CheckoutStep
        name: Checkout
        cloneCredential: !DefaultCredential {}
        withLfs: false
        withSubmodules: false
        condition: ALL_PREVIOUS_STEPS_WERE_SUCCESSFUL

      - !CommandStep
        name: Build Docker Image (Dev)
        runInContainer: true
        image: docker:27-cli
        interpreter: !DefaultInterpreter
          commands: |
            # L-BUILD-01: Use dedicated build container (CT 400) for isolation
            export DOCKER_HOST=tcp://docker-builder.ring20.geelenandcompany.com:2375

            VERSION=$(date +%Y%m%d-%H%M%S)
            REGISTRY=192.168.10.201:5000

            APP_IMAGE=watchtower-dev
            echo "Building ${APP_IMAGE}:${VERSION} (DEVELOPMENT)"
            docker build -t ${REGISTRY}/${APP_IMAGE}:${VERSION} -f Dockerfile .
            docker tag ${REGISTRY}/${APP_IMAGE}:${VERSION} ${REGISTRY}/${APP_IMAGE}:latest
            docker push ${REGISTRY}/${APP_IMAGE}:${VERSION}
            docker push ${REGISTRY}/${APP_IMAGE}:latest

            # L-CICD-05: Verify push
            sleep 2
            if ! wget -q -O - "http://${REGISTRY}/v2/${APP_IMAGE}/tags/list" 2>/dev/null | grep -q "${VERSION}"; then
              echo "ERROR: Image push verification failed!"
              exit 1
            fi
            echo "Image push verified: ${APP_IMAGE}:${VERSION}"

            echo ${VERSION} > /onedev-build/version.txt
        useTTY: true
        condition: ALL_PREVIOUS_STEPS_WERE_SUCCESSFUL

      - !CommandStep
        name: Deploy App to Swarm (Dev)
        runInContainer: true
        image: docker:27-cli
        interpreter: !DefaultInterpreter
          commands: |
            # L-CICD-21: Use host-networked helper to reach Swarm manager.
            export DOCKER_HOST=tcp://docker-builder.ring20.geelenandcompany.com:2375

            VERSION=$(cat /onedev-build/version.txt)
            APP_IMAGE=watchtower-dev
            REGISTRY=192.168.10.201:5000
            SWARM_SERVICE=watchtower-dev_app
            SWARM_MANAGER=192.168.10.201

            echo "Deploying ${APP_IMAGE}:${VERSION} to Swarm (DEVELOPMENT)"

            docker run --rm --network host docker:27-cli sh -c "
              export DOCKER_HOST=tcp://${SWARM_MANAGER}:2375

              echo 'Updating Swarm service...'
              docker service update \
                --image ${REGISTRY}/${APP_IMAGE}:${VERSION} \
                ${SWARM_SERVICE}

              echo 'Waiting for rolling update to converge...'
              for i in \$(seq 1 30); do
                RUNNING=\$(docker service ps ${SWARM_SERVICE} \
                  --filter desired-state=running \
                  --format '{{.CurrentState}}' | grep -c 'Running')
                if [ \"\$RUNNING\" -ge 2 ]; then
                  echo \"App service converged: \${RUNNING} replicas running\"
                  exit 0
                fi
                if [ \"\$i\" = '30' ]; then
                  echo 'ERROR: Swarm rolling update did not converge in 60s'
                  docker service ps ${SWARM_SERVICE}
                  exit 1
                fi
                sleep 2
              done
            "

            echo "Development deployment complete"
        useTTY: true
        condition: ALL_PREVIOUS_STEPS_WERE_SUCCESSFUL

    triggers:
      - !BranchUpdateTrigger
        branches: develop
        paths: -:.claude/**
    retryCondition: never
    maxRetries: 3
    retryDelay: 30
    timeout: 1800
