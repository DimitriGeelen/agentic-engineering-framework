name: Feature Request
description: Suggest a new feature or improvement
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting a feature. Please describe the problem and your proposed solution.

  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem does this feature solve?
      placeholder: "I'm frustrated when..."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: How should this work?
    validations:
      required: true

  - type: dropdown
    id: subsystem
    attributes:
      label: Subsystem
      description: Which part of the framework does this affect?
      options:
        - Task Management
        - Audit System
        - Context Fabric (Memory)
        - Component Fabric (Topology)
        - Git Traceability
        - Healing Loop
        - Handover System
        - Context Budget
        - Enforcement Tiers
        - Watchtower (Web UI)
        - CLI (fw command)
        - Other / Multiple
    validations:
      required: true

  - type: dropdown
    id: scope
    attributes:
      label: Scope
      description: How big is this change?
      options:
        - Small (single file, <1 hour)
        - Medium (few files, 1-4 hours)
        - Large (multiple subsystems, needs design)

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: What other approaches did you consider?

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Screenshots, mockups, links to related issues or discussions.
